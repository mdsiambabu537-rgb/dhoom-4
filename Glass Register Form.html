<body class="h-screen flex items-center justify-center bg-cover bg-center" style="background-image:url(&#39;https://images.unsplash.com/photo-1506744038136-46273834b3fb&#39;);">

  <!-- Form Box -->
  <div class="w-[400px] backdrop-blur-md bg-white/20 border border-white/30 rounded-3xl p-8 shadow-2xl">

    <!-- Title -->
    <div class="flex items-center justify-between mb-10">
      <h1 class="text-5xl font-bold text-black">Register</h1>

      <button class="bg-green-900 text-white w-12 h-12 rounded-xl text-2xl">
        ×
      </button>
    </div>

    <!-- Form -->
    <form id="registerForm" class="space-y-8">

      <!-- Username -->
      <div>
        <div class="flex items-center border-b-2 border-black">
          <input type="text" id="username" placeholder="Username" class="w-full bg-transparent outline-none py-2 text-xl">

          <i class="ri-user-line text-2xl"></i>
        </div>

        <p id="nameError" class="text-red-600 mt-1 hidden">
          Username is required
        </p>
      </div>

      <!-- Email -->
      <div>
        <div class="flex items-center border-b-2 border-black">
          <input type="email" id="email" placeholder="Email" class="w-full bg-transparent outline-none py-2 text-xl">

          <i class="ri-mail-line text-2xl"></i>
        </div>

        <p id="emailError" class="text-red-600 mt-1 hidden">
          Email is required
        </p>
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center border-b-2 border-black">
          <input type="password" id="password" placeholder="Password" class="w-full bg-transparent outline-none py-2 text-xl">

          <i class="ri-lock-fill text-2xl"></i>
        </div>

        <p id="passError" class="text-red-600 mt-1 hidden">
          Password is required
        </p>
      </div>

      <!-- Address -->
      <div>
        <div class="flex items-center border-b-2 border-black">
          <input type="text" id="address" placeholder="Address" class="w-full bg-transparent outline-none py-2 text-xl">

          <i class="ri-map-pin-line text-2xl"></i>
        </div>

        <p id="addressError" class="text-red-600 mt-1 hidden">
          Address is required
        </p>
      </div>

      <!-- Checkbox -->
      <div class="flex items-center gap-2">
        <input type="checkbox" id="check">
        <label>Agree to terms &amp; conditions</label>
      </div>

      <!-- Submit -->
      <button type="submit" class="w-full bg-green-900 hover:bg-green-800 duration-300 text-white py-4 rounded-2xl text-3xl font-bold">
        Register
      </button>

      <p class="text-center text-lg">
        Already have an account?
        <span class="font-bold">Login</span>
      </p>

    </form>

  </div>

  <!-- Show Submitted Data -->
  <div id="showBox" class="hidden fixed top-10 right-10 bg-white p-6 rounded-2xl shadow-2xl w-[350px]">

    <h2 class="text-3xl font-bold mb-5 text-green-700">
      Submitted Data
    </h2>

    <div class="space-y-3 text-lg">
      <p id="showName"></p>
      <p id="showEmail"></p>
      <p id="showPassword"></p>
      <p id="showAddress"></p>
    </div>

  </div>

  <script>

    const form = document.getElementById("registerForm");

    form.addEventListener("submit", function(e){

      e.preventDefault();

      // Input Values
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const address = document.getElementById("address").value;

      // Error Elements
      const nameError = document.getElementById("nameError");
      const emailError = document.getElementById("emailError");
      const passError = document.getElementById("passError");
      const addressError = document.getElementById("addressError");

      // Hide All Errors
      nameError.classList.add("hidden");
      emailError.classList.add("hidden");
      passError.classList.add("hidden");
      addressError.classList.add("hidden");

      let isValid = true;

      // Validation
      if(username === ""){
        nameError.classList.remove("hidden");
        isValid = false;
      }

      if(email === ""){
        emailError.classList.remove("hidden");
        isValid = false;
      }

      if(password === ""){
        passError.classList.remove("hidden");
        isValid = false;
      }

      if(address === ""){
        addressError.classList.remove("hidden");
        isValid = false;
      }

      // If All Correct
      if(isValid){

        document.getElementById("showBox").classList.remove("hidden");

        document.getElementById("showName").innerHTML =
        "<b>Username:</b> " + username;

        document.getElementById("showEmail").innerHTML =
        "<b>Email:</b> " + email;

        document.getElementById("showPassword").innerHTML =
        "<b>Password:</b> " + password;

        document.getElementById("showAddress").innerHTML =
        "<b>Address:</b> " + address;

      }

    });

  </script>
